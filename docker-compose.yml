version: '3.8'

services:
  bank-management:
    build: .
    image: 172.25.65.138:5000/bank-management:latest
    container_name: bank-management-app
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - DB_HOST=${DB_HOST:-172.25.64.1}
      - DB_PORT=5433
      - DB_NAME=postgres_bank
      - DB_USER=postgres
      - DB_PASSWORD=1234
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
